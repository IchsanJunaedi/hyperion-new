name: E2E — Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_MAIN_DOMAIN: localhost:3000
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
      FONNTE_API_TOKEN: ${{ secrets.FONNTE_API_TOKEN }}
      FONNTE_WEBHOOK_SECRET: ${{ secrets.FONNTE_WEBHOOK_SECRET }}
      # E2E-specific secrets
      E2E_OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
      E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
      E2E_TEAM_SLUG: ${{ secrets.E2E_TEAM_SLUG }}
      # Tells Playwright not to start a server (CI builds the app itself)
      PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright Chromium browser
        run: npx playwright install --with-deps chromium

      - name: 🏗️ Build Next.js application
        run: npm run build

      - name: 🧪 Run Playwright E2E tests
        run: npm run test:e2e

      - name: 📸 Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: 🎬 Upload test videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: test-results/
          retention-days: 7
