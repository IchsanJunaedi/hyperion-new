name: keep-alive

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pqzdukrlmbwjjgjyoqva.supabase.co/rest/v1/?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "supabase responded: $code"
