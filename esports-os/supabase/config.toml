# https://supabase.com/docs/guides/local-development/cli/config
project_id = "tbuxtlbtjpoholcflmoy"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[storage]
enabled = true
file_size_limit = "50MiB"
image_transformation = { enabled = true }

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "https://hyperionteam.id",
  "https://*.vercel.app",
  "http://localhost:3000",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

# Custom access-token hook — populated by 20260510000004_jwt_hook.sql.
# Auto-discovered by supabase auth admin via pg_proc lookup once enabled
# in the dashboard (Auth → Hooks → Custom Access Token).
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
redirect_uri = ""
skip_nonce_check = false

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.process-wa-queue]
verify_jwt = false
import_map = "./functions/process-wa-queue/deno.json"

[analytics]
enabled = false
